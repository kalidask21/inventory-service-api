name: Build → Push → Deploy

on:
  push:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build the Spring Boot Docker image and push to GitHub Container Registry
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # needed to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          # Layer cache keyed to the branch — speeds up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Job 2: Deploy the Worker + container config to Cloudflare
  #
  # Required GitHub secrets:
  #   CLOUDFLARE_API_TOKEN  — CF API token with Workers:Edit permission
  #   CLOUDFLARE_ACCOUNT_ID — your CF account ID (Settings → Account ID)
  #
  # Required: make the ghcr.io package public (GitHub → package settings →
  # Change visibility → Public), OR add pull credentials in the CF dashboard
  # (Workers & Pages → Settings → Container Registry Credentials).
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Cloudflare Workers Containers
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Deploy via Wrangler
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

serviceAccount: 'projects/inboxcapital/serviceAccounts/cloud-build-sa@inboxcapital.iam.gserviceaccount.com'

steps:
  # Step 1: Write Docker credentials into shared volume
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - auth
      - configure-docker
      - us-central1-docker.pkg.dev
    volumes:
      - name: 'docker-config'
        path: '/root/.docker'

  # Step 2: Build — reads credentials from shared volume
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/inboxcapital/inventory-repo/inventory-api:$COMMIT_SHA
      - -t
      - us-central1-docker.pkg.dev/inboxcapital/inventory-repo/inventory-api:latest
      - .
    volumes:
      - name: 'docker-config'
        path: '/root/.docker'

  # Step 3: Push — reads credentials from shared volume
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/inboxcapital/inventory-repo/inventory-api
    volumes:
      - name: 'docker-config'
        path: '/root/.docker'

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - inventory-api
      - --image=us-central1-docker.pkg.dev/inboxcapital/inventory-repo/inventory-api:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --set-env-vars=SPRING_PROFILES_ACTIVE=default

images:
  - us-central1-docker.pkg.dev/inboxcapital/inventory-repo/inventory-api:$COMMIT_SHA
  - us-central1-docker.pkg.dev/inboxcapital/inventory-repo/inventory-api:latest

options:
  logging: NONE

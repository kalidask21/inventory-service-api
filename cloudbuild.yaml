serviceAccount: 'projects/gcpessesentials/serviceAccounts/cloud-build-sa@gcpessesentials.iam.gserviceaccount.com'

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/gcpessesentials/inventory-repo/inventory-api:$COMMIT_SHA
      - -t
      - us-central1-docker.pkg.dev/gcpessesentials/inventory-repo/inventory-api:latest
      - .

  # Push both tags to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/gcpessesentials/inventory-repo/inventory-api

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - inventory-api
      - --image=us-central1-docker.pkg.dev/gcpessesentials/inventory-repo/inventory-api:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --set-env-vars=SPRING_PROFILES_ACTIVE=default

images:
  - us-central1-docker.pkg.dev/gcpessesentials/inventory-repo/inventory-api:$COMMIT_SHA
  - us-central1-docker.pkg.dev/gcpessesentials/inventory-repo/inventory-api:latest

options:
  logging: NONE
